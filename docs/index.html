<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Be the Star</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#E8739A; --pink-light:#F4A7C0; --pink-pale:#FDE8F0;
  --pink-glow:rgba(232,115,154,0.3); --lavender:#C4A8D8;
  --bg:#FDF0F5; --text:#3D2440; --text-mid:#7A4F6D; --text-dim:#B08AA0;
  --box-bg:rgba(255,255,255,0.92); --shadow:0 8px 32px rgba(200,100,150,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#f0d8e8;overflow:hidden;font-family:'Noto Sans KR',sans-serif;}

/* ── 게임 컨테이너 ── */
#game{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1280px;height:720px;overflow:hidden;background:var(--bg);}

/* ── 파티클 ── */
#particle-canvas{position:absolute;inset:0;pointer-events:none;z-index:2;opacity:0.6;}

/* ── 배경 ── */
#bg{position:absolute;inset:0;background:linear-gradient(135deg,#fff0f8 0%,#f5e6f5 50%,#ede0f8 100%);background-size:cover;background-position:center;transition:background 1.2s ease;z-index:0;}
#bg-pattern{position:absolute;inset:0;z-index:1;pointer-events:none;background-image:radial-gradient(circle at 20% 20%,rgba(232,115,154,0.05) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(196,168,216,0.07) 0%,transparent 50%);}
#bg-overlay{position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(to bottom,rgba(255,255,255,0.1) 0%,transparent 40%,rgba(255,240,248,0.2) 100%);}
#pin-light{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:300px;height:500px;background:linear-gradient(to bottom,rgba(255,200,220,0.2) 0%,transparent 100%);clip-path:polygon(33% 0%,67% 0%,100% 100%,0% 100%);opacity:0;transition:opacity 1.5s;pointer-events:none;z-index:3;}

/* ── HUD ── */
#hud{position:absolute;top:0;left:0;right:0;padding:14px 28px;background:rgba(255,255,255,0.75);backdrop-filter:blur(16px);border-bottom:1px solid rgba(232,115,154,0.15);display:flex;align-items:center;gap:16px;z-index:30;box-shadow:0 2px 12px rgba(200,100,150,0.08);}
#scene-badge{font-size:13px;letter-spacing:3px;color:var(--pink);font-weight:600;background:var(--pink-pale);padding:5px 14px;border-radius:100px;border:1px solid rgba(232,115,154,0.2);}
#scene-title{font-family:'Cormorant Garamond';font-style:italic;font-size:21px;color:var(--text-mid);}
#hud-sp{flex:1;}
.stats{display:flex;gap:20px;}
.stat{display:flex;flex-direction:column;align-items:center;gap:3px;}
.stat-label{font-size:12px;color:var(--text-dim);letter-spacing:1.5px;}
.stat-bar{width:52px;height:5px;background:rgba(232,115,154,0.15);border-radius:100px;overflow:hidden;}
.stat-fill{height:100%;background:linear-gradient(to right,var(--pink-light),var(--pink));border-radius:100px;transition:width 0.6s ease;}
.stat-val{font-size:16px;color:var(--pink);font-weight:700;font-family:'Playfair Display';}

/* ── 캐릭터 ── */
#characters{position:absolute;bottom:0;left:0;right:0;height:600px;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;z-index:10;}
.char-slot{width:320px;height:580px;display:flex;align-items:flex-end;justify-content:center;position:relative;transition:filter 0.5s ease,transform 0.5s ease,opacity 0.5s ease;filter:brightness(0.6) saturate(0.5);opacity:0;}
.char-slot.vis{opacity:1;}
.char-slot.act{filter:brightness(1) saturate(1.05) drop-shadow(0 0 16px rgba(232,115,154,0.35));transform:scale(1.03) translateY(-8px);}
.char-img{width:100%;height:100%;object-fit:contain;object-position:bottom;display:none;}
.char-svg-wrap{width:160px;height:380px;display:flex;align-items:flex-end;justify-content:center;}
.char-svg-wrap svg{width:100%;height:100%;}
.char-glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:220px;height:160px;background:radial-gradient(ellipse,rgba(232,115,154,0.18) 0%,transparent 70%);opacity:0;transition:opacity 0.5s;pointer-events:none;}
.char-slot.act .char-glow{opacity:1;}
.char-name{position:absolute;bottom:210px;width:100%;text-align:center;font-size:13px;letter-spacing:2px;color:var(--pink);opacity:0;transition:opacity 0.3s;font-weight:600;}
.char-slot.act .char-name{opacity:1;}

/* ── 대사창 ── */
#dialogue-box{position:absolute;bottom:0;left:0;right:0;height:200px;background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border-top:1.5px solid rgba(232,115,154,0.2);padding:0 100px 24px 100px;display:flex;flex-direction:column;justify-content:center;z-index:15;cursor:pointer;box-shadow:0 -4px 24px rgba(200,100,150,0.08);}
#dialogue-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(to right,transparent,var(--pink-light),var(--lavender),var(--pink-light),transparent);}
#dialogue-box::after{content:'♡';position:absolute;top:-13px;right:108px;font-size:18px;color:var(--pink-light);}
#speaker-plate{position:absolute;top:-24px;left:100px;padding:6px 22px;background:linear-gradient(135deg,var(--pink),var(--pink-light));border-radius:100px;box-shadow:0 4px 12px var(--pink-glow);opacity:0;transition:opacity 0.25s;display:flex;align-items:center;gap:6px;}
#speaker-plate.show{opacity:1;}
#speaker-plate::before{content:'✦';font-size:10px;color:rgba(255,255,255,0.7);}
#speaker-name{font-size:16px;font-weight:600;color:#fff;letter-spacing:1px;}
#dialogue-text{font-size:25px;line-height:1.85;color:var(--text);font-weight:300;letter-spacing:0.2px;min-height:60px;}
#dialogue-text.narr{color:var(--text-mid);font-family:'Cormorant Garamond';font-style:italic;font-size:22px;}
#dialogue-text.sys{color:var(--pink);font-weight:600;text-align:center;font-size:21px;letter-spacing:3px;}
#next-btn{position:absolute;bottom:20px;right:44px;display:flex;align-items:center;gap:6px;color:var(--pink-light);font-size:15px;letter-spacing:2px;font-weight:600;animation:nextBlink 1.8s ease-in-out infinite;pointer-events:none;}
#next-btn::before{content:'♡';font-size:16px;}
#next-btn.hidden{opacity:0;}
@keyframes nextBlink{0%,100%{opacity:0.4}50%{opacity:1}}

/* ── 선택지 ── */
#choices-panel{position:absolute;bottom:200px;right:0;width:40%;display:flex;flex-direction:column;align-items:flex-end;gap:8px;padding:12px 14px 12px 0;opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:20;}
#choices-panel.show{opacity:1;pointer-events:all;}
#choice-q{font-size:15px;color:var(--text-dim);letter-spacing:1px;margin-bottom:2px;text-align:right;font-family:'Cormorant Garamond';font-style:italic;}
.choice-btn{width:94%;padding:14px 18px;background:rgba(255,255,255,0.92);border:1.5px solid rgba(232,115,154,0.2);border-radius:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s ease;opacity:0;transform:translateX(16px);animation:choiceSlide 0.3s ease forwards;box-shadow:0 4px 16px rgba(200,100,150,0.08);backdrop-filter:blur(10px);}
.choice-btn:nth-child(2){animation-delay:0.05s}.choice-btn:nth-child(3){animation-delay:0.1s}.choice-btn:nth-child(4){animation-delay:0.15s}
@keyframes choiceSlide{to{opacity:1;transform:translateX(0)}}
.choice-btn:hover{background:var(--pink-pale);border-color:var(--pink-light);transform:translateX(-3px);}
.choice-key{width:32px;height:32px;background:linear-gradient(135deg,var(--pink),var(--pink-light));border-radius:100px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.choice-text{font-size:19px;color:var(--text);font-weight:400;line-height:1.5;flex:1;}

/* ── 토스트 ── */
#toast{position:absolute;top:60px;left:50%;transform:translateX(-50%) translateY(-80px);background:linear-gradient(135deg,var(--pink),var(--lavender));color:#fff;padding:9px 26px;border-radius:100px;font-size:16px;font-weight:600;letter-spacing:2px;z-index:50;pointer-events:none;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1),opacity 0.4s;opacity:0;white-space:nowrap;box-shadow:0 4px 20px var(--pink-glow);}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── 팝업 ── */
#popup-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(253,240,248,0.7);backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:45;}
#popup-overlay.show{opacity:1;pointer-events:all;}
#popup-content{max-width:680px;background:rgba(255,255,255,0.96);border:1.5px solid rgba(232,115,154,0.2);border-radius:24px;padding:32px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 20px 60px rgba(200,100,150,0.15);}
#popup-content img{max-width:100%;max-height:380px;object-fit:contain;border-radius:12px;}
#popup-text{font-size:22px;color:var(--text);line-height:1.9;text-align:center;}
#popup-close{font-size:15px;color:var(--text-dim);letter-spacing:2px;}

/* ── 타이틀 ── */
#title-screen{position:absolute;inset:0;z-index:100;overflow:hidden;background:#ffffff;cursor:pointer;}
#title-screen.out{opacity:0;pointer-events:none;transition:opacity 0.8s ease;}

#t-bg{position:absolute;inset:0;background:url('title_bg.png') center/cover no-repeat;opacity:0;transition:opacity 1.5s ease;z-index:1;}
#t-bg.show{opacity:1;}

#t-logo{position:absolute;inset:0;background:url('title_logo.png') center/contain no-repeat;opacity:0;transition:opacity 1.2s ease;background-position:center 45%;z-index:3;}
#t-logo.show{opacity:1;}

#t-canvas{position:absolute;inset:0;pointer-events:none;z-index:4;}

#t-sub{position:absolute;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);font-family:'Noto Sans KR';font-size:21px;color:rgba(100,70,140,0.85);letter-spacing:8px;white-space:nowrap;z-index:5;opacity:0;transition:opacity 0.8s ease,transform 0.8s ease;}
#t-sub.show{opacity:1;transform:translateX(-50%) translateY(0);}

#t-touch{position:absolute;bottom:22%;left:50%;transform:translateX(-50%);font-size:18px;color:rgba(160,120,200,0.7);letter-spacing:4px;z-index:3;opacity:0;transition:opacity 0.6s ease;pointer-events:none;white-space:nowrap;z-index:5;}
#t-touch.show{opacity:1;animation:touchBlink 2s ease-in-out infinite;}
@keyframes touchBlink{0%,100%{opacity:0.35}50%{opacity:0.85}}

#t-btn{position:absolute;bottom:11%;left:50%;transform:translateX(-50%) translateY(14px);padding:16px 60px;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.65);border-radius:100px;color:#fff;font-size:22px;font-weight:600;letter-spacing:5px;cursor:pointer;z-index:3;opacity:0;transition:opacity 0.7s ease,transform 0.7s ease;box-shadow:0 8px 32px rgba(180,130,210,0.3);backdrop-filter:blur(10px);text-shadow:0 1px 8px rgba(200,150,220,0.6);white-space:nowrap;}
#t-btn.show{opacity:1;transform:translateX(-50%) translateY(0);}
#t-btn:hover{background:rgba(255,255,255,0.32);}

#t-ver{position:absolute;bottom:14px;right:22px;font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:2px;z-index:3;}

/* ── 엔딩 ── */
#ending-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(253,240,248,0.97);opacity:0;pointer-events:none;transition:opacity 0.8s;z-index:55;}
#ending-screen.show{opacity:1;pointer-events:all;}
#ending-title{font-family:'Playfair Display';font-size:78px;background:linear-gradient(135deg,var(--pink),var(--lavender));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;}
#ending-desc{font-family:'Cormorant Garamond';font-style:italic;font-size:24px;color:var(--text-mid);text-align:center;line-height:2.2;}
#ending-stats{display:flex;gap:40px;margin:16px 0;}
.e-stat{text-align:center;}
.e-stat-name{font-size:13px;color:var(--text-dim);letter-spacing:2px;}
.e-stat-val{font-family:'Playfair Display';font-size:66px;background:linear-gradient(135deg,var(--pink),var(--lavender));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#restart-btn{padding:13px 42px;border:1.5px solid rgba(232,115,154,0.3);background:transparent;border-radius:100px;color:var(--text-dim);font-size:18px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;}
#restart-btn:hover{border-color:var(--pink);color:var(--pink);background:var(--pink-pale);}
</style>
</head>
<body>
<div id="game">

  <!-- 타이틀 -->
  <div id="title-screen" onclick="titleClick()">
    <div id="t-bg"></div>
    <div id="t-logo"></div>
    <canvas id="t-canvas"></canvas>
    <div id="t-sub">너의 빛이 되는 순간</div>
    <div id="t-touch">▾ TOUCH TO CONTINUE</div>
    <button id="t-btn" onclick="event.stopPropagation();startGame()">▶ START DEMO</button>
    <div id="t-ver">SCENE 01–03 · VERTICAL SLICE</div>
  </div>

  <!-- 배경 -->
  <div id="bg"></div>
  <div id="bg-pattern"></div>
  <canvas id="particle-canvas"></canvas>
  <div id="pin-light"></div>
  <div id="bg-overlay"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="scene-badge">SCENE 01</div>
    <div id="scene-title"></div>
    <div id="hud-sp"></div>
    <div class="stats">
      <div class="stat"><div class="stat-label">노력</div><div class="stat-bar"><div class="stat-fill" id="f-effort" style="width:20%"></div></div><div class="stat-val" id="v-effort">2</div></div>
      <div class="stat"><div class="stat-label">실력</div><div class="stat-bar"><div class="stat-fill" id="f-skill" style="width:20%"></div></div><div class="stat-val" id="v-skill">2</div></div>
      <div class="stat"><div class="stat-label">인기</div><div class="stat-bar"><div class="stat-fill" id="f-fame" style="width:10%"></div></div><div class="stat-val" id="v-fame">1</div></div>
      <div class="stat"><div class="stat-label">방송</div><div class="stat-bar"><div class="stat-fill" id="f-broadcast" style="width:20%"></div></div><div class="stat-val" id="v-broadcast">2</div></div>
    </div>
  </div>

  <!-- 캐릭터 -->
  <div id="characters">
    <div class="char-slot" id="slot-left">
      <div class="char-glow"></div>
      <img class="char-img" id="img-left" src="">
      <div class="char-svg-wrap" id="svg-left"></div>
      <div class="char-name" id="name-left"></div>
    </div>
    <div class="char-slot" id="slot-center">
      <div class="char-glow"></div>
      <img class="char-img" id="img-center" src="">
      <div class="char-svg-wrap" id="svg-center"></div>
      <div class="char-name" id="name-center"></div>
    </div>
    <div class="char-slot" id="slot-right">
      <div class="char-glow"></div>
      <img class="char-img" id="img-right" src="">
      <div class="char-svg-wrap" id="svg-right"></div>
      <div class="char-name" id="name-right"></div>
    </div>
  </div>

  <!-- 대사창 -->
  <div id="dialogue-box" onclick="advance()">
    <div id="speaker-plate"><span id="speaker-name"></span></div>
    <div id="dialogue-text"></div>
    <div id="next-btn">NEXT</div>
  </div>

  <!-- 선택지 -->
  <div id="choices-panel"><div id="choice-q"></div></div>

  <!-- 토스트 -->
  <div id="toast"></div>

  <!-- 팝업 -->
  <div id="popup-overlay" onclick="closePopup()">
    <div id="popup-content">
      <img id="popup-img" src="" style="display:none">
      <div id="popup-text"></div>
      <div id="popup-close">♡ 탭하여 계속</div>
    </div>
  </div>

  <!-- 엔딩 -->
  <div id="ending-screen">
    <div id="ending-title">DEMO COMPLETE</div>
    <div id="ending-desc"></div>
    <div id="ending-stats">
      <div class="e-stat"><div class="e-stat-name">노력</div><div class="e-stat-val" id="e-effort">—</div></div>
      <div class="e-stat"><div class="e-stat-name">실력</div><div class="e-stat-val" id="e-skill">—</div></div>
      <div class="e-stat"><div class="e-stat-name">인기</div><div class="e-stat-val" id="e-fame">—</div></div>
      <div class="e-stat"><div class="e-stat-name">방송</div><div class="e-stat-val" id="e-broadcast">—</div></div>
    </div>
    <button id="restart-btn" onclick="restartGame()">↺ RESTART</button>
  </div>
</div>

<script>
// ══ 파티클 ══
function initParticles(canvasId,count,colors,w,h){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=w||1280;canvas.height=h||720;
  const pts=Array.from({length:count},()=>({
    x:Math.random()*(w||1280),y:Math.random()*(h||720),
    size:Math.random()*2+0.5,opacity:Math.random(),
    speed:Math.random()*0.4+0.1,
    color:colors[Math.floor(Math.random()*colors.length)],
    phase:Math.random()*Math.PI*2,
    heart:Math.random()>0.6,
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{
      p.phase+=p.speed*0.02;p.opacity=0.2+Math.sin(p.phase)*0.5;
      p.y-=p.speed*0.15;if(p.y<0){p.y=canvas.height;p.x=Math.random()*canvas.width;}
      ctx.save();ctx.globalAlpha=Math.max(0,p.opacity);ctx.fillStyle=p.color;
      if(p.heart&&p.size>1.2){
        const s=p.size*0.8;
        ctx.beginPath();ctx.moveTo(p.x,p.y+s*0.3);
        ctx.bezierCurveTo(p.x,p.y,p.x-s,p.y,p.x-s,p.y-s*0.5);
        ctx.bezierCurveTo(p.x-s,p.y-s*1.2,p.x,p.y-s*1.2,p.x,p.y-s*0.5);
        ctx.bezierCurveTo(p.x,p.y-s*1.2,p.x+s,p.y-s*1.2,p.x+s,p.y-s*0.5);
        ctx.bezierCurveTo(p.x+s,p.y,p.x,p.y,p.x,p.y+s*0.3);ctx.fill();
      } else {
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}
const PC=['#F4A7C0','#E8739A','#C4A8D8','#FFDDE8','#ffffff'];
initParticles('particle-canvas',60,PC);
initParticles('t-canvas',50,['rgba(255,255,255,0.9)','rgba(240,200,230,0.8)'],1280,720);

// ══ 타이틀 연출 ══
let titlePhase=0;

document.addEventListener('DOMContentLoaded',function(){
  // 1단계: 배경 페이드인 (1초 동안)
  setTimeout(function(){
    document.getElementById('t-bg').classList.add('show');
  },200);
  // 2단계: 로고 페이드인 (배경 다 뜨고 나서)
  setTimeout(function(){
    document.getElementById('t-logo').classList.add('show');
  },1400);
  // 3단계: 로고 완전히 등장 후 TOUCH 텍스트
  setTimeout(function(){
    titlePhase=2;
    document.getElementById('t-touch').classList.add('show');
  },2800);
});

function titleClick(){
  if(titlePhase<2)return;
  if(titlePhase===2){
    titlePhase=3;
    document.getElementById('t-touch').classList.remove('show');
    document.getElementById('t-sub').classList.add('show');
    setTimeout(function(){
      document.getElementById('t-btn').classList.add('show');
    },400);
  }
}

// ══ 스탯 ══
const S={effort:2,skill:2,fame:1,broadcast:2};
function applyFx(str){
  if(!str)return;
  str.split(',').forEach(e=>{
    e=e.trim();const m=e.match(/^(\w+)([+-])(\d+)$/);
    if(m){const[,stat,op,val]=m;if(S[stat]!==undefined)S[stat]=Math.max(0,Math.min(10,S[stat]+(op==='+'?1:-1)*parseInt(val)));}
  });
  refreshHUD();
}
function refreshHUD(){
  ['effort','skill','fame','broadcast'].forEach(k=>{
    document.getElementById('f-'+k).style.width=(S[k]*10)+'%';
    document.getElementById('v-'+k).textContent=S[k];
  });
}

  document.getElementById('scene-badge').textContent=sc.badge;
  document.getElementById('scene-title').textContent=sc.title;
  // 배경 이미지 로드 시도, 없으면 그라디언트 폴백
  const bgEl = document.getElementById('bg');
  const testImg = new Image();
  testImg.onload = function(){ bgEl.style.backgroundImage = 'url("'+sc.bgImg+'")'; bgEl.style.backgroundSize='cover'; bgEl.style.backgroundPosition='center'; };
  testImg.onerror = function(){ bgEl.style.backgroundImage='none'; bgEl.style.background = sc.bgFallback; };
  testImg.src = sc.bgImg;
  document.getElementById('pin-light').style.opacity=sc.pin?'1':'0';
  ['left','center','right'].forEach(hideChar);
  runEv(sc.first);
}

function runEv(id){
  if(!id)return;
  if(id==='ENDING'){showEnding();return;}
  if(SCENES[id]){loadScene(id);return;}
  const ev=EV[id];if(!ev)return;
  curEv=id;
  if(ev.slot&&ev.move==='start'&&ev.t!=='char_exit'){
    if(ev.sp)showChar(ev.slot,ev.sp,ev.expr);
  }
  switch(ev.t){
    case 'char_exit':hideChar(ev.slot);runEv(ev.next);break;
    case 'bgm':
      if(ev.bgm){ /* BGM 재생 로직 - 추후 Audio 연동 */ console.log('[BGM]',ev.bgm); }
      runEv(ev.next);break;
    case 'narr':setActive(ev.sp?getSlot(ev.sp):null);showText('narr','',ev.tx,ev.next,ev);break;
    case 'sys':showText('sys','',ev.tx,ev.next,ev);break;
    case 'line':setActive(getSlot(ev.sp));showText('line',SPEAKERS[ev.sp]||ev.sp,ev.tx,ev.next,ev);break;
    case 'choice':showChoices(ev.cid,ev.tx);break;
    case 'checkpoint':showToast(ev.cpNum,ev.next);break;
    case 'popup':showPopup(ev.popupType,ev.asset,ev.tx,ev.next);break;
    case 'scene_end':runEv(ev.next);break;
    default:runEv(ev.next);
  }
}

function showText(type,speaker,text,next,ev){
  pendingNext=next;
  const plate=document.getElementById('speaker-plate');
  const textEl=document.getElementById('dialogue-text');
  const nextEl=document.getElementById('next-btn');
  if(type==='narr'||type==='sys'){plate.classList.remove('show');textEl.className=type;}
  else{plate.classList.add('show');document.getElementById('speaker-name').textContent=speaker;textEl.className='';}
  nextEl.classList.remove('hidden');
  typeText(textEl,text);
  if(ev&&ev.slot&&ev.move==='end'&&ev.t!=='char_exit'){
    setTimeout(function(){if(ev.sp)showChar(ev.slot,ev.sp,ev.expr);},(text.length*24*0.7));
  }
}

function typeText(el,text){
  typing=true;el.textContent='';let i=0;
  clearInterval(typeTimer);
  typeTimer=setInterval(function(){el.textContent+=text[i++];if(i>=text.length){clearInterval(typeTimer);typing=false;}},24);
}

function advance(){
  if(document.getElementById('choices-panel').classList.contains('show'))return;
  if(document.getElementById('popup-overlay').classList.contains('show'))return;
  if(document.getElementById('ending-screen').classList.contains('show'))return;
  if(document.getElementById('title-screen').style.display!=='none'&&!document.getElementById('title-screen').classList.contains('out'))return;
  if(typing){
    clearInterval(typeTimer);typing=false;
    const ev=EV[curEv];if(ev&&ev.tx)document.getElementById('dialogue-text').textContent=ev.tx;
    return;
  }
  if(pendingNext){const n=pendingNext;pendingNext=null;runEv(n);}
}

function showChoices(cid,question){
  document.getElementById('next-btn').classList.add('hidden');
  setActive(null);
  const panel=document.getElementById('choices-panel');
  while(panel.children.length>1)panel.removeChild(panel.lastChild);
  document.getElementById('choice-q').textContent=question;
  const opts=Object.entries(EV).filter(function([k,v]){return v.t==='choice_option'&&v.cid===cid;});
  const keys=['A','B','C','D'];
  opts.forEach(function([k,v],i){
    const btn=document.createElement('div');
    btn.className='choice-btn';
    btn.innerHTML='<div class="choice-key">'+keys[i]+'</div><div class="choice-text">'+v.tx+'</div>';
    btn.onclick=function(e){e.stopPropagation();applyFx(v.fx);panel.classList.remove('show');document.getElementById('next-btn').classList.remove('hidden');runEv(v.next);};
    panel.appendChild(btn);
  });
  panel.classList.add('show');
}

function showToast(cpNum,next){
  const toast=document.getElementById('toast');
  toast.textContent='💾  CHECKPOINT '+cpNum+' 저장됨';
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){toast.classList.remove('show');setTimeout(function(){runEv(next);},400);},1800);
}

function showPopup(type,asset,text,next){
  popupNext=next;
  document.getElementById('next-btn').classList.add('hidden');
  const imgEl=document.getElementById('popup-img');
  const textEl=document.getElementById('popup-text');
  if(type==='image'&&asset){imgEl.src='images/popup/'+asset;imgEl.style.display='block';textEl.textContent='';}
  else{imgEl.style.display='none';textEl.textContent=text;}
  document.getElementById('popup-overlay').classList.add('show');
}
function closePopup(){
  document.getElementById('popup-overlay').classList.remove('show');
  document.getElementById('next-btn').classList.remove('hidden');
  if(popupNext){const n=popupNext;popupNext=null;runEv(n);}
}

function showChar(slot,spId,expr){
  if(!slot||!spId)return;
  charState[slot]=spId;
  const slotEl=document.getElementById('slot-'+slot);
  const imgEl=document.getElementById('img-'+slot);
  const svgEl=document.getElementById('svg-'+slot);
  const nameEl=document.getElementById('name-'+slot);
  slotEl.classList.add('vis');
  nameEl.textContent=SPEAKERS[spId]||spId;
  const src=getCharImg(spId,expr||'default');
  if(!src){
    imgEl.style.display='none';svgEl.style.display='flex';
    svgEl.innerHTML=SILS[CHAR_SIL[spId]||'default']||SILS.default;
    return;
  }
  const img=new Image();
  img.onload=function(){imgEl.src=src;imgEl.style.display='block';svgEl.style.display='none';};
  img.onerror=function(){
    if(expr&&expr!=='default'){
      const ds=getCharImg(spId,'default');
      if(ds){const i2=new Image();i2.onload=function(){imgEl.src=ds;imgEl.style.display='block';svgEl.style.display='none';};i2.onerror=function(){imgEl.style.display='none';svgEl.style.display='flex';svgEl.innerHTML=SILS[CHAR_SIL[spId]||'default']||SILS.default;};i2.src=ds;return;}
    }
    imgEl.style.display='none';svgEl.style.display='flex';
    svgEl.innerHTML=SILS[CHAR_SIL[spId]||'default']||SILS.default;
  };
  img.src=src;
}
function hideChar(slot){
  if(!slot)return;charState[slot]=null;
  const el=document.getElementById('slot-'+slot);
  if(el)el.classList.remove('vis','act');
}
function setActive(slot){
  ['left','center','right'].forEach(function(s){document.getElementById('slot-'+s).classList.remove('act');});
  if(slot)document.getElementById('slot-'+slot).classList.add('act');
}
function getSlot(spId){
  for(const[slot,id] of Object.entries(charState)){if(id===spId)return slot;}
  return null;
}

function showEnding(){
  const total=Object.values(S).reduce(function(a,b){return a+b;},0);
  document.getElementById('ending-desc').innerHTML=total>=15?'당신의 선택은 빛났습니다.<br>이 무대는 당신을 기다리고 있었는지 모릅니다.':'당신의 이야기는 이제 막 시작되었습니다.<br>무대 위의 조명이 당신을 기다리고 있습니다.';
  ['effort','skill','fame','broadcast'].forEach(function(k){document.getElementById('e-'+k).textContent=S[k];});
  document.getElementById('ending-screen').classList.add('show');
}

function startGame(){
  const ts=document.getElementById('title-screen');
  ts.classList.add('out');
  setTimeout(function(){ts.style.display='none';loadScene('S01');},800);
}
function restartGame(){
  S.effort=2;S.skill=2;S.fame=1;S.broadcast=2;refreshHUD();
  ['left','center','right'].forEach(hideChar);
  document.getElementById('ending-screen').classList.remove('show');
  const ts=document.getElementById('title-screen');
  ts.style.display='';ts.style.opacity='';ts.classList.remove('out');
  titlePhase=0;
  setTimeout(function(){
    document.getElementById('t-bg').classList.remove('show');
    document.getElementById('t-logo').classList.remove('show');
    document.getElementById('t-touch').classList.remove('show');
    document.getElementById('t-sub').classList.remove('show');
    document.getElementById('t-btn').classList.remove('show');
  },0);
  setTimeout(function(){
    document.getElementById('t-bg').classList.add('show');
  },300);
  setTimeout(function(){
    document.getElementById('t-logo').classList.add('show');
  },800);
  setTimeout(function(){
    titlePhase=2;
    document.getElementById('t-touch').classList.add('show');
  },2400);
}

document.addEventListener('keydown',function(e){if(e.code==='Space'||e.code==='Enter'){e.preventDefault();advance();}});

function resize(){
  const scale=Math.min(window.innerWidth/1280,window.innerHeight/720);
  document.getElementById('game').style.transform='translate(-50%,-50%) scale('+scale+')';
}
window.addEventListener('resize',resize);
resize();
</script>
