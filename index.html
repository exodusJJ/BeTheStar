<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Be the Star</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --pink:       #E8739A;
  --pink-light: #F4A7C0;
  --pink-pale:  #FDE8F0;
  --pink-glow:  rgba(232,115,154,0.3);
  --lavender:   #C4A8D8;
  --lavender-light: #EDE0F5;
  --white:      #FFFFFF;
  --bg:         #FDF0F5;
  --bg2:        #F8E8F2;
  --text:       #3D2440;
  --text-mid:   #7A4F6D;
  --text-dim:   #B08AA0;
  --box-bg:     rgba(255,255,255,0.92);
  --shadow:     0 8px 32px rgba(200,100,150,0.15);
  --shadow-soft:0 4px 16px rgba(200,100,150,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#f0d8e8; overflow:hidden; font-family:'Noto Sans KR', sans-serif; }

/* ── 게임 컨테이너 ── */
#game {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:1280px; height:720px;
  overflow:hidden;
  background:var(--bg);
}

/* ── 파티클 캔버스 ── */
#particle-canvas {
  position:absolute; inset:0;
  pointer-events:none; z-index:2; opacity:0.7;
}

/* ── 배경 ── */
#bg {
  position:absolute; inset:0;
  background:linear-gradient(135deg, #fdf0f8 0%, #f5e6f5 50%, #ede0f8 100%);
  background-size:cover; background-position:center;
  transition:background 1.2s ease; z-index:0;
}
#bg-pattern {
  position:absolute; inset:0; z-index:1; pointer-events:none;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(232,115,154,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(196,168,216,0.08) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 70%);
}
#bg-overlay {
  position:absolute; inset:0; z-index:2; pointer-events:none;
  background:linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, transparent 40%, rgba(255,240,248,0.3) 100%);
}
#pin-light {
  position:absolute; top:-60px; left:50%; transform:translateX(-50%);
  width:300px; height:500px;
  background:linear-gradient(to bottom, rgba(255,200,220,0.25) 0%, transparent 100%);
  clip-path:polygon(33% 0%, 67% 0%, 100% 100%, 0% 100%);
  opacity:0; transition:opacity 1.5s; pointer-events:none; z-index:3;
}

/* ── HUD ── */
#hud {
  position:absolute; top:0; left:0; right:0;
  padding:14px 28px;
  display:flex; align-items:center; gap:16px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(232,115,154,0.15);
  z-index:20;
  box-shadow:0 2px 12px rgba(200,100,150,0.08);
}
#scene-badge {
  font-size:13.5px; letter-spacing:3px; color:var(--pink);
  font-weight:600; text-transform:uppercase;
  background:var(--pink-pale);
  padding:4px 12px; border-radius:100px;
  border:1px solid rgba(232,115,154,0.2);
}
#scene-title {
  font-family:'Cormorant Garamond'; font-style:italic;
  font-size:21px; color:var(--text-mid); letter-spacing:0.5px;
}
#hud-sp { flex:1; }
.stats { display:flex; gap:18px; }
.stat { display:flex; flex-direction:column; align-items:center; gap:3px; }
.stat-label { font-size:12px; color:var(--text-dim); letter-spacing:1.5px; }
.stat-bar {
  width:60px; height:5px;
  background:rgba(232,115,154,0.15);
  border-radius:100px; overflow:hidden;
}
.stat-fill {
  height:100%;
  background:linear-gradient(to right, var(--pink-light), var(--pink));
  border-radius:100px; transition:width 0.6s ease;
}
.stat-val { font-size:20px; color:var(--pink); font-weight:700; font-family:'Playfair Display'; }

/* ── 캐릭터 ── */
#characters {
  position:absolute; bottom:200px; left:0; right:0;
  height:440px; display:flex; align-items:flex-end; justify-content:center;
  pointer-events:none; z-index:5;
}
.char-slot {
  width:300px; height:420px;
  display:flex; align-items:flex-end; justify-content:center;
  position:relative;
  transition:filter 0.5s ease, transform 0.5s ease, opacity 0.5s ease;
  filter:brightness(0.7) saturate(0.6);
  opacity:0;
}
.char-slot.vis { opacity:1; }
.char-slot.act {
  filter:brightness(1) saturate(1.05);
  transform:scale(1.03) translateY(-6px);
}
.char-img { width:100%; height:100%; object-fit:contain; object-position:bottom; display:none; }
.char-svg-wrap { width:160px; height:380px; display:flex; align-items:flex-end; justify-content:center; }
.char-svg-wrap svg { width:100%; height:100%; }
.char-glow {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:220px; height:180px;
  background:radial-gradient(ellipse, rgba(232,115,154,0.2) 0%, transparent 70%);
  opacity:0; transition:opacity 0.5s; pointer-events:none;
}
.char-slot.act .char-glow { opacity:1; }
.char-name {
  position:absolute; bottom:-2px; width:100%;
  text-align:center; font-size:13.5px; letter-spacing:2px;
  color:var(--pink); opacity:0; transition:opacity 0.3s;
  font-weight:600;
}
.char-slot.act .char-name { opacity:1; }

/* ── 대사창 ── */
#dialogue-box {
  position:absolute; bottom:0; left:0; right:0;
  height:200px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  border-top:1.5px solid rgba(232,115,154,0.2);
  padding:0 100px 24px 100px;
  display:flex; flex-direction:column; justify-content:center;
  z-index:20; cursor:pointer;
  box-shadow:0 -4px 24px rgba(200,100,150,0.08);
}
#dialogue-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1.5px;
  background:linear-gradient(to right, transparent, var(--pink-light), var(--lavender), var(--pink-light), transparent);
}
/* 코너 하트 장식 */
#dialogue-box::after {
  content:'♡'; position:absolute; top:-11px; right:108px;
  font-size:21px; color:var(--pink-light);
}

/* 네임플레이트 — pill 형태 */
#speaker-plate {
  position:absolute; top:-20px; left:100px;
  padding:5px 20px;
  background:linear-gradient(135deg, var(--pink) 0%, var(--pink-light) 100%);
  border-radius:100px;
  box-shadow:0 4px 12px var(--pink-glow);
  opacity:0; transition:opacity 0.25s;
  display:flex; align-items:center; gap:6px;
}
#speaker-plate.show { opacity:1; }
#speaker-plate::before {
  content:'✦'; font-size:12px; color:rgba(255,255,255,0.7);
}
#speaker-name { font-size:18px; font-weight:600; color:#fff; letter-spacing:1px; }

/* 대사 텍스트 */
#dialogue-text {
  font-size:25.5px; line-height:1.9; color:var(--text);
  font-weight:300; letter-spacing:0.2px; min-height:60px;
}
#dialogue-text.narr {
  color:var(--text-mid);
  font-family:'Cormorant Garamond'; font-style:italic;
  font-size:22.5px; letter-spacing:0.3px;
}
#dialogue-text.sys {
  color:var(--pink); font-weight:600;
  text-align:center; font-size:21px; letter-spacing:3px;
}

/* NEXT 버튼 */
#next-btn {
  position:absolute; bottom:18px; right:36px;
  display:flex; align-items:center; gap:6px;
  color:var(--pink-light); font-size:15px; letter-spacing:2px;
  font-weight:600;
  animation:nextBlink 1.8s ease-in-out infinite;
  pointer-events:none;
}
#next-btn::before { content:'♡'; font-size:18px; }
#next-btn.hidden { opacity:0; }
@keyframes nextBlink { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ── 선택지 — 우측 대사창 위 ── */
#choices-panel {
  position:absolute; bottom:200px; right:0;
  width:40%;
  display:flex; flex-direction:column;
  align-items:flex-end; gap:8px;
  padding:12px 14px 12px 0;
  opacity:0; pointer-events:none;
  transition:opacity 0.3s; z-index:25;
}
#choices-panel.show { opacity:1; pointer-events:all; }
#choice-q {
  font-size:15px; color:var(--text-dim);
  letter-spacing:1px; margin-bottom:2px;
  text-align:right;
  font-family:'Cormorant Garamond'; font-style:italic;
}
.choice-btn {
  width:94%;
  padding:13px 18px;
  background:rgba(255,255,255,0.92);
  border:1.5px solid rgba(232,115,154,0.2);
  border-radius:16px;
  display:flex; align-items:center; gap:12px;
  cursor:pointer;
  transition:all 0.2s ease;
  opacity:0; transform:translateX(16px);
  animation:choiceSlide 0.3s ease forwards;
  box-shadow:0 4px 16px rgba(200,100,150,0.08);
  backdrop-filter:blur(10px);
}
.choice-btn:nth-child(2){animation-delay:0.05s}
.choice-btn:nth-child(3){animation-delay:0.1s}
.choice-btn:nth-child(4){animation-delay:0.15s}
@keyframes choiceSlide { to{opacity:1;transform:translateX(0)} }
.choice-btn:hover {
  background:var(--pink-pale);
  border-color:var(--pink-light);
  transform:translateX(-3px);
  box-shadow:0 6px 20px var(--pink-glow);
}
.choice-key {
  width:26px; height:26px;
  background:linear-gradient(135deg, var(--pink) 0%, var(--pink-light) 100%);
  border-radius:100px;
  display:flex; align-items:center; justify-content:center;
  font-size:16.5px; font-weight:700; color:#fff;
  flex-shrink:0;
  box-shadow:0 2px 8px var(--pink-glow);
}
.choice-text { font-size:19.5px; color:var(--text); font-weight:400; line-height:1.5; flex:1; }

/* ── 토스트 ── */
#toast {
  position:absolute; top:50px; left:50%;
  transform:translateX(-50%) translateY(-70px);
  background:linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
  color:#fff; padding:8px 24px;
  border-radius:100px;
  font-size:16.5px; font-weight:600; letter-spacing:2px;
  z-index:40; pointer-events:none;
  transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
  opacity:0; white-space:nowrap;
  box-shadow:0 4px 20px var(--pink-glow);
}
#toast::before { content:'💾  '; }
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* ── 팝업 ── */
#popup-overlay {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(253,240,248,0.7);
  backdrop-filter:blur(12px);
  opacity:0; pointer-events:none;
  transition:opacity 0.3s; z-index:35;
}
#popup-overlay.show { opacity:1; pointer-events:all; }
#popup-content {
  max-width:680px;
  background:rgba(255,255,255,0.95);
  border:1.5px solid rgba(232,115,154,0.2);
  border-radius:24px;
  padding:32px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:16px;
  box-shadow:0 20px 60px rgba(200,100,150,0.15);
}
#popup-content img { max-width:100%; max-height:380px; object-fit:contain; border-radius:12px; }
#popup-text { font-size:22.5px; color:var(--text); line-height:1.9; text-align:center; }
#popup-close { font-size:15px; color:var(--text-dim); letter-spacing:2px; }

/* ── 타이틀 ── */
#title-screen {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; transition:opacity 0.8s;
  overflow:hidden;
  background:url('title_bg.png') center/cover no-repeat;
}
#title-screen.out { opacity:0; pointer-events:none; }

/* 타이틀 배경 원들 */
.t-ring {
  position:absolute; border-radius:50%;
  border:1px solid rgba(232,115,154,0.12);
  animation:tRingPulse 5s ease-in-out infinite;
}
.t-ring:nth-child(1){ width:320px; height:320px; animation-delay:0s; }
.t-ring:nth-child(2){ width:520px; height:520px; animation-delay:0.6s; }
.t-ring:nth-child(3){ width:720px; height:720px; animation-delay:1.2s; border-color:rgba(196,168,216,0.1); }
.t-ring:nth-child(4){ width:920px; height:920px; animation-delay:1.8s; border-color:rgba(196,168,216,0.07); }
@keyframes tRingPulse { 0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.015)} }

/* 타이틀 글로우 */
#title-glow {
  position:absolute; width:400px; height:400px;
  border-radius:50%;
  background:radial-gradient(ellipse, rgba(232,115,154,0.15) 0%, transparent 70%);
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse { 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.1);opacity:1} }

#title-logo {
  font-family:'Playfair Display'; font-size:96px;
  color:var(--text); letter-spacing:6px; line-height:0.95;
  text-align:center; position:relative; z-index:2;
  text-shadow:0 2px 20px rgba(232,115,154,0.2);
}
#title-logo .accent {
  background:linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
#title-star {
  font-size:24px; color:var(--pink-light);
  text-align:center; letter-spacing:16px;
  margin-top:8px; position:relative; z-index:2;
  animation:starTwinkle 2s ease-in-out infinite;
}
@keyframes starTwinkle { 0%,100%{opacity:0.5} 50%{opacity:1} }
#title-sub {
  font-family:'Noto Sans KR'; font-style:normal;
  font-size:15px; color:rgba(255,255,255,0.7); letter-spacing:6px;
  margin-top:0; margin-bottom:48px; position:relative; z-index:2;
  text-shadow:0 2px 12px rgba(200,150,220,0.5);
}
#start-btn {
  padding:16px 60px;
  background:rgba(255,255,255,0.2);
  border:1.5px solid rgba(255,255,255,0.6);
  border-radius:100px;
  color:#fff; font-size:16px; font-weight:600;
  letter-spacing:5px; cursor:pointer;
  transition:all 0.3s ease; position:relative; z-index:2;
  box-shadow:0 8px 32px rgba(200,150,220,0.3);
  backdrop-filter:blur(8px);
  text-shadow:0 1px 8px rgba(200,150,220,0.5);
}
#start-btn:hover {
  background:rgba(255,255,255,0.35);
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(200,150,220,0.5);
}
#start-btn:active { transform:translateY(0); }
#title-ver { position:absolute; bottom:18px; right:24px; font-size:13.5px; color:rgba(255,255,255,0.5); letter-spacing:2px; }

/* ── 엔딩 ── */
#ending-screen {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  background:rgba(253,240,248,0.97);
  opacity:0; pointer-events:none;
  transition:opacity 0.8s; z-index:50;
}
#ending-screen.show { opacity:1; pointer-events:all; }
#ending-title {
  font-family:'Playfair Display'; font-size:72px;
  background:linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; letter-spacing:4px;
}
#ending-desc {
  font-family:'Cormorant Garamond'; font-style:italic;
  font-size:24px; color:var(--text-mid); text-align:center; line-height:2.2;
}
#ending-stats { display:flex; gap:40px; margin:16px 0; }
.e-stat { text-align:center; }
.e-stat-name { font-size:13.5px; color:rgba(255,255,255,0.5); letter-spacing:2px; }
.e-stat-val {
  font-family:'Playfair Display'; font-size:66px;
  background:linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
#restart-btn {
  padding:12px 40px; border:1.5px solid rgba(232,115,154,0.3);
  background:transparent; border-radius:100px;
  color:var(--text-dim); font-size:18px;
  letter-spacing:3px; cursor:pointer; transition:all 0.2s;
}
#restart-btn:hover {
  border-color:var(--pink); color:var(--pink);
  background:var(--pink-pale);
}
</style>
</head>
<body>
<div id="game">

  <!-- 타이틀 -->
  <div id="title-screen">

    <canvas id="title-canvas" style="position:absolute;inset:0;pointer-events:none;width:100%;height:100%;"></canvas>
    <div id="title-sub">너의 빛이 되는 순간</div>
    <button id="start-btn" onclick="startGame()">▶ START DEMO</button>
    <div id="title-ver">SCENE 01–03 · VERTICAL SLICE</div>
  </div>

  <!-- 배경 -->
  <div id="bg"></div>
  <div id="bg-pattern"></div>
  <canvas id="particle-canvas"></canvas>
  <div id="pin-light"></div>
  <div id="bg-overlay"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="scene-badge">SCENE 01</div>
    <div id="scene-title"></div>
    <div id="hud-sp"></div>
    <div class="stats">
      <div class="stat"><div class="stat-label">노력</div><div class="stat-bar"><div class="stat-fill" id="f-effort" style="width:20%"></div></div><div class="stat-val" id="v-effort">2</div></div>
      <div class="stat"><div class="stat-label">실력</div><div class="stat-bar"><div class="stat-fill" id="f-skill" style="width:20%"></div></div><div class="stat-val" id="v-skill">2</div></div>
      <div class="stat"><div class="stat-label">인기</div><div class="stat-bar"><div class="stat-fill" id="f-fame" style="width:10%"></div></div><div class="stat-val" id="v-fame">1</div></div>
      <div class="stat"><div class="stat-label">방송</div><div class="stat-bar"><div class="stat-fill" id="f-broadcast" style="width:20%"></div></div><div class="stat-val" id="v-broadcast">2</div></div>
    </div>
  </div>

  <!-- 캐릭터 -->
  <div id="characters">
    <div class="char-slot" id="slot-left">
      <div class="char-glow"></div>
      <img class="char-img" id="img-left" src="">
      <div class="char-svg-wrap" id="svg-left"></div>
      <div class="char-name" id="name-left"></div>
    </div>
    <div class="char-slot" id="slot-center">
      <div class="char-glow"></div>
      <img class="char-img" id="img-center" src="">
      <div class="char-svg-wrap" id="svg-center"></div>
      <div class="char-name" id="name-center"></div>
    </div>
    <div class="char-slot" id="slot-right">
      <div class="char-glow"></div>
      <img class="char-img" id="img-right" src="">
      <div class="char-svg-wrap" id="svg-right"></div>
      <div class="char-name" id="name-right"></div>
    </div>
  </div>

  <!-- 대사창 -->
  <div id="dialogue-box" onclick="advance()">
    <div id="speaker-plate"><span id="speaker-name"></span></div>
    <div id="dialogue-text"></div>
    <div id="next-btn">NEXT</div>
  </div>

  <!-- 선택지 -->
  <div id="choices-panel"><div id="choice-q"></div></div>

  <!-- 토스트 -->
  <div id="toast">CHECKPOINT 저장됨</div>

  <!-- 팝업 -->
  <div id="popup-overlay" onclick="closePopup()">
    <div id="popup-content">
      <img id="popup-img" src="" style="display:none">
      <div id="popup-text"></div>
      <div id="popup-close">♡ 탭하여 계속</div>
    </div>
  </div>

  <!-- 엔딩 -->
  <div id="ending-screen">
    <div id="ending-title">DEMO COMPLETE</div>
    <div id="ending-desc"></div>
    <div id="ending-stats">
      <div class="e-stat"><div class="e-stat-name">노력</div><div class="e-stat-val" id="e-effort">—</div></div>
      <div class="e-stat"><div class="e-stat-name">실력</div><div class="e-stat-val" id="e-skill">—</div></div>
      <div class="e-stat"><div class="e-stat-name">인기</div><div class="e-stat-val" id="e-fame">—</div></div>
      <div class="e-stat"><div class="e-stat-name">방송</div><div class="e-stat-val" id="e-broadcast">—</div></div>
    </div>
    <button id="restart-btn" onclick="restartGame()">↺ RESTART</button>
  </div>

</div>
<script>
// ══ 파티클 ══
function initParticles(canvasId, count, colors, w, h) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = w || 1280; canvas.height = h || 720;
  const pts = Array.from({length:count}, () => ({
    x: Math.random()*(w||1280), y: Math.random()*(h||720),
    size: Math.random()*2+0.5,
    opacity: Math.random(),
    speed: Math.random()*0.4+0.1,
    color: colors[Math.floor(Math.random()*colors.length)],
    phase: Math.random()*Math.PI*2,
    shape: Math.random()>0.6 ? 'heart' : 'circle',
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{
      p.phase+=p.speed*0.02; p.opacity=0.2+Math.sin(p.phase)*0.5;
      p.y-=p.speed*0.15; if(p.y<0){p.y=canvas.height;p.x=Math.random()*canvas.width;}
      ctx.save(); ctx.globalAlpha=Math.max(0,p.opacity);
      ctx.fillStyle=p.color;
      if(p.shape==='heart'&&p.size>1.2){
        const s=p.size*0.8;
        ctx.beginPath();
        ctx.moveTo(p.x,p.y+s*0.3);
        ctx.bezierCurveTo(p.x,p.y,p.x-s,p.y,p.x-s,p.y-s*0.5);
        ctx.bezierCurveTo(p.x-s,p.y-s*1.2,p.x,p.y-s*1.2,p.x,p.y-s*0.5);
        ctx.bezierCurveTo(p.x,p.y-s*1.2,p.x+s,p.y-s*1.2,p.x+s,p.y-s*0.5);
        ctx.bezierCurveTo(p.x+s,p.y,p.x,p.y,p.x,p.y+s*0.3);
        ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

const S={effort:2,skill:2,fame:1,broadcast:2};
function applyFx(str){
  if(!str)return;
  str.split(',').forEach(e=>{
    e=e.trim();const m=e.match(/^(\w+)([+-])(\d+)$/);
    if(m){const[,stat,op,val]=m;if(S[stat]!==undefined)S[stat]=Math.max(0,Math.min(10,S[stat]+(op==='+'?1:-1)*parseInt(val)));}
  });
  refreshHUD();
}
function refreshHUD(){
  ['effort','skill','fame','broadcast'].forEach(k=>{
    document.getElementById('f-'+k).style.width=(S[k]*10)+'%';
    document.getElementById('v-'+k).textContent=S[k];
  });
}

// ══ 상태 ══
let curEv=null,pendingNext=null,typing=false,typeTimer=null;
const charState={left:null,center:null,right:null};
let popupNext=null,toastTimer=null;

function loadScene(id){
  const sc=SCENES[id];if(!sc)return;
  document.getElementById('scene-badge').textContent=sc.badge;
  document.getElementById('scene-title').textContent=sc.title;
  document.getElementById('bg').style.background=sc.bg;
  document.getElementById('pin-light').style.opacity=sc.pin?'1':'0';
  ['left','center','right'].forEach(hideChar);
  runEv(sc.first);
}

function runEv(id){
  if(!id)return;
  if(id==='ENDING'){showEnding();return;}
  if(SCENES[id]){loadScene(id);return;}
  const ev=EV[id];if(!ev)return;
  curEv=id;
  if(ev.slot&&ev.move==='start'&&ev.t!=='char_exit'){
    if(ev.sp)showChar(ev.slot,ev.sp,ev.expr);
  }
  switch(ev.t){
    case 'char_exit': hideChar(ev.slot);runEv(ev.next);break;
    case 'bgm': runEv(ev.next);break;
    case 'narr': setActive(ev.sp?getSlot(ev.sp):null);showText('narr','',ev.tx,ev.next,ev);break;
    case 'sys': showText('sys','',ev.tx,ev.next,ev);break;
    case 'line': setActive(getSlot(ev.sp));showText('line',SPEAKERS[ev.sp]||ev.sp,ev.tx,ev.next,ev);break;
    case 'choice': showChoices(ev.cid,ev.tx);break;
    case 'checkpoint': showToast(ev.cpNum,ev.next);break;
    case 'popup': showPopup(ev.popupType,ev.asset,ev.tx,ev.next);break;
    case 'scene_end': runEv(ev.next);break;
    default: runEv(ev.next);
  }
}

function showText(type,speaker,text,next,ev){
  pendingNext=next;
  const plate=document.getElementById('speaker-plate');
  const textEl=document.getElementById('dialogue-text');
  const nextEl=document.getElementById('next-btn');
  if(type==='narr'||type==='sys'){plate.classList.remove('show');textEl.className=type;}
  else{plate.classList.add('show');document.getElementById('speaker-name').textContent=speaker;textEl.className='';}
  nextEl.classList.remove('hidden');
  typeText(textEl,text);
  if(ev&&ev.slot&&ev.move==='end'&&ev.t!=='char_exit'){
    setTimeout(()=>{if(ev.sp)showChar(ev.slot,ev.sp,ev.expr);},(text.length*24*0.7));
  }
}

function typeText(el,text){
  typing=true;el.textContent='';let i=0;
  clearInterval(typeTimer);
  typeTimer=setInterval(()=>{el.textContent+=text[i++];if(i>=text.length){clearInterval(typeTimer);typing=false;}},24);
}

function advance(){
  if(document.getElementById('choices-panel').classList.contains('show'))return;
  if(document.getElementById('popup-overlay').classList.contains('show'))return;
  if(document.getElementById('ending-screen').classList.contains('show'))return;
  if(!document.getElementById('title-screen').classList.contains('out'))return;
  if(typing){
    clearInterval(typeTimer);typing=false;
    const ev=EV[curEv];if(ev&&ev.tx)document.getElementById('dialogue-text').textContent=ev.tx;
    return;
  }
  if(pendingNext){const n=pendingNext;pendingNext=null;runEv(n);}
}

function showChoices(cid,question){
  document.getElementById('next-btn').classList.add('hidden');
  setActive(null);
  const panel=document.getElementById('choices-panel');
  while(panel.children.length>1)panel.removeChild(panel.lastChild);
  document.getElementById('choice-q').textContent=question;
  const opts=Object.entries(EV).filter(([k,v])=>v.t==='choice_option'&&v.cid===cid);
  const keys=['A','B','C','D'];
  opts.forEach(([k,v],i)=>{
    const btn=document.createElement('div');
    btn.className='choice-btn';
    btn.innerHTML=`<div class="choice-key">${keys[i]}</div><div class="choice-text">${v.tx}</div>`;
    btn.onclick=e=>{e.stopPropagation();applyFx(v.fx);panel.classList.remove('show');document.getElementById('next-btn').classList.remove('hidden');runEv(v.next);};
    panel.appendChild(btn);
  });
  panel.classList.add('show');
}

function showToast(cpNum,next){
  const toast=document.getElementById('toast');
  toast.textContent='CHECKPOINT '+cpNum+' 저장됨';
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{toast.classList.remove('show');setTimeout(()=>runEv(next),400);},1800);
}

function showPopup(type,asset,text,next){
  popupNext=next;
  document.getElementById('next-btn').classList.add('hidden');
  const imgEl=document.getElementById('popup-img');
  const textEl=document.getElementById('popup-text');
  if(type==='image'&&asset){imgEl.src='images/popup/'+asset;imgEl.style.display='block';textEl.textContent='';}
  else{imgEl.style.display='none';textEl.textContent=text;}
  document.getElementById('popup-overlay').classList.add('show');
}
function closePopup(){
  document.getElementById('popup-overlay').classList.remove('show');
  document.getElementById('next-btn').classList.remove('hidden');
  if(popupNext){const n=popupNext;popupNext=null;runEv(n);}
}

function showChar(slot,spId,expr){
  if(!slot||!spId)return;
  charState[slot]=spId;
  const slotEl=document.getElementById('slot-'+slot);
  const imgEl=document.getElementById('img-'+slot);
  const svgEl=document.getElementById('svg-'+slot);
  const nameEl=document.getElementById('name-'+slot);
  slotEl.classList.add('vis');
  nameEl.textContent=SPEAKERS[spId]||spId;
  const src = getCharImg(spId, expr || 'default');
  const img = new Image();
  img.onload = () => {
    imgEl.src = src;
    imgEl.style.display = 'block';
    svgEl.style.display = 'none';
  };
  img.onerror = () => {
    // 표정 이미지 없으면 default 시도
    if (expr && expr !== 'default') {
      const defaultSrc = getCharImg(spId, 'default');
      if (defaultSrc) {
        const img2 = new Image();
        img2.onload = () => { imgEl.src = defaultSrc; imgEl.style.display = 'block'; svgEl.style.display = 'none'; };
        img2.onerror = () => { imgEl.style.display = 'none'; svgEl.style.display = 'flex'; svgEl.innerHTML = SILS[CHAR_SIL[spId]||'default'] || SILS.default; };
        img2.src = defaultSrc;
        return;
      }
    }
    // default도 없으면 실루엣
    imgEl.style.display = 'none';
    svgEl.style.display = 'flex';
    svgEl.innerHTML = SILS[CHAR_SIL[spId]||'default'] || SILS.default;
  };
  if (src) img.src = src;
  else { imgEl.style.display='none'; svgEl.style.display='flex'; svgEl.innerHTML=SILS[CHAR_SIL[spId]||'default']||SILS.default; }
}
function hideChar(slot){
  if(!slot)return;charState[slot]=null;
  const el=document.getElementById('slot-'+slot);
  if(el)el.classList.remove('vis','act');
}
function setActive(slot){
  ['left','center','right'].forEach(s=>document.getElementById('slot-'+s).classList.remove('act'));
  if(slot)document.getElementById('slot-'+slot).classList.add('act');
}
function getSlot(spId){
  for(const[slot,id] of Object.entries(charState))if(id===spId)return slot;
  return null;
}

function showEnding(){
  const total=Object.values(S).reduce((a,b)=>a+b,0);
  document.getElementById('ending-desc').innerHTML=total>=15
    ?'당신의 선택은 빛났습니다.<br>이 무대는 당신을 기다리고 있었는지 모릅니다.'
    :'당신의 이야기는 이제 막 시작되었습니다.<br>무대 위의 조명이 당신을 기다리고 있습니다.';
  ['effort','skill','fame','broadcast'].forEach(k=>document.getElementById('e-'+k).textContent=S[k]);
  document.getElementById('ending-screen').classList.add('show');
}

function startGame(){
  document.getElementById('title-screen').classList.add('out');
  setTimeout(()=>{document.getElementById('title-screen').style.display='none';loadScene('S01');},800);
}
function restartGame(){
  S.effort=2;S.skill=2;S.fame=1;S.broadcast=2;refreshHUD();
  ['left','center','right'].forEach(hideChar);
  document.getElementById('ending-screen').classList.remove('show');
  const t=document.getElementById('title-screen');
  t.style.display='flex';t.style.opacity='1';t.classList.remove('out');
}

document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();advance();}});
function resize(){const scale=Math.min(window.innerWidth/1280,window.innerHeight/720);document.getElementById('game').style.transform=`translate(-50%,-50%) scale(${scale})`;}
window.addEventListener('resize',resize);resize();
</script>
